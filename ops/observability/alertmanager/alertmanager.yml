# Alertmanager routing. Boots clean with a null default receiver; wire your
# real channel (Telegram/Slack/PagerDuty) in the marked block and point the
# route at it. Critical alerts are grouped tighter and repeat faster.
global:
  resolve_timeout: 5m

route:
  receiver: 'null'
  group_by: ['alertname', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers: ['severity = "critical"']
      receiver: 'null'          # ← change to 'oncall' once configured below
      group_wait: 10s
      repeat_interval: 1h

receivers:
  - name: 'null'

  # ── Configure your real channel, then repoint the routes above ───────
  # - name: 'oncall'
  #   telegram_configs:
  #     - bot_token: '${TELEGRAM_ALERT_BOT_TOKEN}'
  #       chat_id: ${TELEGRAM_ALERT_CHAT_ID}
  #       parse_mode: 'HTML'
  #   # or slack_configs / pagerduty_configs / webhook_configs
