# Load every dashboard JSON under /var/lib/grafana/dashboards on boot.
apiVersion: 1
providers:
  - name: algosphere
    orgId: 1
    folder: AlgoSphere
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
