# Prometheus scrape config for the copy-engine worker cluster.
# Workers expose /metrics via prometheus_client on METRICS_PORT (set =9100 in
# the worker .env). dns_sd resolves each compose service name to ALL of its
# replica IPs, so scaled executors (--scale executor=N) are all scraped.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert.rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: copy-engine
    metrics_path: /metrics
    dns_sd_configs:
      - names: [orchestrator, executor, reconciler, coach]
        type: A
        port: 9100
    relabel_configs:
      # Surface the resolved service name as `service` for cleaner panels.
      - source_labels: [__meta_dns_name]
        target_label: service

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
