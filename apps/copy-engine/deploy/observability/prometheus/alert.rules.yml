# Alerting rules — all expressions use metrics actually emitted by
# shared/metrics.py (verified names). Tune thresholds to your volume.
groups:
  - name: copy-engine
    rules:
      - alert: CopyQueueBacklog
        expr: algosphere_copy_queue_depth > 100
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "Copy queue backlog ({{ $value }} jobs queued)"
          description: "Queued copy_jobs > 100 for 5m — executors under-provisioned or stalled. Scale executor or check worker health."

      - alert: ExecLatencyHigh
        expr: histogram_quantile(0.95, sum(rate(algosphere_copy_exec_latency_seconds_bucket[5m])) by (le, broker)) > 5
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "p95 /execute latency > 5s for {{ $labels.broker }}"
          description: "Engine round-trip is slow — broker or bridge degradation likely."

      - alert: DeadLetterRising
        expr: sum(rate(algosphere_copy_dlq_total[15m])) > 0
        for: 10m
        labels: { severity: critical }
        annotations:
          summary: "Jobs are being dead-lettered"
          description: "copy_jobs are hitting the DLQ. Inspect /admin/dlq and replay after fixing the cause."

      - alert: WorkerDown
        expr: absent(algosphere_copy_worker_up) or (max by (service) (algosphere_copy_worker_up) < 1)
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "A copy-engine worker is down or not reporting"
          description: "No worker_up=1 for a service for 2m. Check the worker VPS / container."

      - alert: KillSwitchActive
        expr: algosphere_global_kill_switch > 0
        for: 1m
        labels: { severity: critical }
        annotations:
          summary: "GLOBAL KILL SWITCH ACTIVE — execution halted"
          description: "All new exposure is blocked (reduce-only flatten still allowed). Confirm this is intended."

      - alert: RetryStorm
        expr: sum(rate(algosphere_copy_retries_total[5m])) > 1
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "Elevated job retry rate"
          description: "Sustained transient failures — broker/engine instability or rate limiting."

      - alert: ReconciliationDiscrepancies
        expr: sum(rate(algosphere_copy_recon_flagged_total[30m])) > 0
        for: 15m
        labels: { severity: warning }
        annotations:
          summary: "Reconciler is flagging intent↔broker divergence"
          description: "copy_reconciliation rows are being written. Review desyncs in the Risk/Command center."
