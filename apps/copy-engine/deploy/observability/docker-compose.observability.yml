# Observability stack for the copy-engine worker cluster (Phase 11).
# Joins the `algosphere` network created by ../../docker-compose.yml so it can
# scrape the workers' /metrics by service name. Bring the workers up FIRST
# (that compose creates the network), then:
#
#   docker compose -f docker-compose.observability.yml up -d
#
# Grafana → http://localhost:3001  (admin / GRAFANA_ADMIN_PASSWORD, default admin)
# Prometheus → http://localhost:9090   Alertmanager → http://localhost:9093

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prom-data:/prometheus
    ports: ["9090:9090"]
    networks: [algosphere]
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command: ["--config.file=/etc/alertmanager/alertmanager.yml"]
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports: ["9093:9093"]
    networks: [algosphere]
    restart: unless-stopped

  loki:
    image: grafana/loki:3.1.1
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    ports: ["3100:3100"]
    networks: [algosphere]
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.1.1
    command: ["-config.file=/etc/promtail/promtail-config.yml"]
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [algosphere]
    depends_on: [loki]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports: ["3001:3000"]
    networks: [algosphere]
    depends_on: [prometheus, loki]
    restart: unless-stopped

volumes:
  prom-data:
  loki-data:
  grafana-data:

networks:
  algosphere:
    external: true
    name: algosphere
