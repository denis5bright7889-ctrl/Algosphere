# AlgoSphere copy-engine — self-hosted Linux worker cluster.
#
# ADDITIVE / OPTIONAL. Production currently runs these workers on Railway
# (railway.json + Procfile) — that is unchanged. This compose is the
# dedicated-worker-VPS alternative, co-located with Redis. It does NOT run
# the signal-engine or the Windows MT5 bridge: workers reach the engine over
# SIGNAL_ENGINE_URL and the engine owns broker execution (only /execute
# places trades). Copy apps/copy-engine/.env.example → .env first.
#
#   docker compose up -d --build
#   docker compose up -d --scale executor=3      # SKIP LOCKED → safe to scale
#   docker compose logs -f executor

x-worker: &worker
  build: .
  env_file: .env
  depends_on:
    redis:
      condition: service_healthy
  restart: unless-stopped
  stop_grace_period: 30s            # let the asyncio loop drain its claim
  logging:
    driver: json-file
    options: { max-size: "10m", max-file: "5" }

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    volumes: ["redis-data:/data"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  orchestrator:
    <<: *worker
    command: ["python", "orchestrator.py"]
    healthcheck:
      test: ["CMD", "pgrep", "-f", "orchestrator.py"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  executor:
    <<: *worker
    command: ["python", "executor.py"]
    # No container_name → scalable with --scale executor=N. Concurrency is
    # safe: claim_copy_jobs uses FOR UPDATE SKIP LOCKED + idempotent
    # client_order_id, so N executors never double-process or double-fill.
    deploy:
      replicas: 2
    healthcheck:
      test: ["CMD", "pgrep", "-f", "executor.py"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  reconciler:
    <<: *worker
    command: ["python", "reconciler.py"]
    healthcheck:
      test: ["CMD", "pgrep", "-f", "reconciler.py"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 15s

  coach:
    <<: *worker
    command: ["python", "coach.py"]
    healthcheck:
      test: ["CMD", "pgrep", "-f", "coach.py"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  redis-data:
