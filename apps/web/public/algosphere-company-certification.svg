<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1131" preserveAspectRatio="xMidYMid meet" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif">
  <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
  <!-- AlgoSphere Quant — Certificate of Platform Operational Standing -->
  <!-- Vector A4 landscape (1600 × 1131). Self-contained SVG.           -->
  <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->

  <defs>
    <!-- Background: deep institutional black with subtle radial glow -->
    <radialGradient id="bg" cx="50%" cy="38%" r="80%">
      <stop offset="0%"  stop-color="#0e1014"/>
      <stop offset="55%" stop-color="#06070a"/>
      <stop offset="100%" stop-color="#020306"/>
    </radialGradient>

    <!-- Amber gradient for accents -->
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#f5b942"/>
      <stop offset="60%"  stop-color="#e09a18"/>
      <stop offset="100%" stop-color="#a86a00"/>
    </linearGradient>

    <linearGradient id="amber-soft" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#f5b942" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#a86a00" stop-opacity="0.75"/>
    </linearGradient>

    <!-- Silver gradient for divider line -->
    <linearGradient id="silver" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1a1d22"/>
      <stop offset="50%"  stop-color="#8a90a0"/>
      <stop offset="100%" stop-color="#1a1d22"/>
    </linearGradient>

    <!-- Subtle grain texture overlay -->
    <pattern id="grain" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="40"  r="0.6" fill="#ffffff" opacity="0.020"/>
      <circle cx="80" cy="120" r="0.4" fill="#ffffff" opacity="0.015"/>
      <circle cx="160" cy="60" r="0.5" fill="#ffffff" opacity="0.018"/>
      <circle cx="100" cy="180" r="0.3" fill="#ffffff" opacity="0.012"/>
      <circle cx="40" cy="160"  r="0.4" fill="#ffffff" opacity="0.015"/>
    </pattern>

    <!-- Crest gradient -->
    <radialGradient id="crestFill" cx="50%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#1a1d22"/>
      <stop offset="60%"  stop-color="#0c0e12"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <!-- Glow filter for seal -->
    <filter id="sealGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- ── Background ───────────────────────────────────────────────── -->
  <rect width="1600" height="1131" fill="url(#bg)"/>
  <rect width="1600" height="1131" fill="url(#grain)"/>

  <!-- Decorative inner double-frame -->
  <rect x="50"  y="50"  width="1500" height="1031"
        fill="none" stroke="url(#amber)" stroke-width="2" opacity="0.85"/>
  <rect x="68"  y="68"  width="1464" height="995"
        fill="none" stroke="url(#amber)" stroke-width="0.6" opacity="0.55"/>
  <rect x="86"  y="86"  width="1428" height="959"
        fill="none" stroke="#8a90a0" stroke-width="0.4" opacity="0.35"/>

  <!-- Corner ornaments -->
  <g stroke="url(#amber)" stroke-width="2" fill="none" opacity="0.85">
    <!-- TL -->
    <path d="M 65 105 L 65 65 L 105 65"/>
    <path d="M 85 90 L 85 85 L 90 85"/>
    <!-- TR -->
    <path d="M 1535 105 L 1535 65 L 1495 65"/>
    <path d="M 1515 90 L 1515 85 L 1510 85"/>
    <!-- BL -->
    <path d="M 65 1026 L 65 1066 L 105 1066"/>
    <path d="M 85 1041 L 85 1046 L 90 1046"/>
    <!-- BR -->
    <path d="M 1535 1026 L 1535 1066 L 1495 1066"/>
    <path d="M 1515 1041 L 1515 1046 L 1510 1046"/>
  </g>

  <!-- ── Brand header ─────────────────────────────────────────────── -->
  <g transform="translate(800, 168)">
    <!-- Brand mark: stylised sphere with orbit -->
    <g>
      <circle cx="0" cy="0" r="34" fill="url(#crestFill)" stroke="url(#amber)" stroke-width="2.4"/>
      <circle cx="0" cy="0" r="22" fill="none" stroke="url(#amber)" stroke-width="1.2" opacity="0.85"/>
      <ellipse cx="0" cy="0" rx="40" ry="14" fill="none" stroke="url(#amber)" stroke-width="1" opacity="0.55"/>
      <ellipse cx="0" cy="0" rx="40" ry="14" fill="none" stroke="url(#amber)" stroke-width="1" opacity="0.55"
               transform="rotate(60)"/>
      <ellipse cx="0" cy="0" rx="40" ry="14" fill="none" stroke="url(#amber)" stroke-width="1" opacity="0.55"
               transform="rotate(-60)"/>
      <circle cx="0" cy="0" r="3" fill="url(#amber)"/>
    </g>
    <!-- Wordmark -->
    <text x="0" y="98" text-anchor="middle"
          font-size="36" font-weight="800" letter-spacing="14"
          fill="#e8eaed">ALGOSPHERE</text>
    <text x="0" y="124" text-anchor="middle"
          font-size="14" font-weight="600" letter-spacing="22"
          fill="url(#amber)">— Q U A N T —</text>
  </g>

  <!-- Top eyebrow line -->
  <line x1="240" y1="332" x2="1360" y2="332"
        stroke="url(#silver)" stroke-width="1" opacity="0.6"/>
  <text x="800" y="320" text-anchor="middle"
        font-size="11" font-weight="700" letter-spacing="8" fill="#8a90a0">
    INSTITUTIONAL  ·  ESTABLISHED 2026  ·  GLOBAL
  </text>

  <!-- ── Title block ──────────────────────────────────────────────── -->
  <text x="800" y="400" text-anchor="middle"
        font-family="'Cormorant Garamond', 'Georgia', 'Times New Roman', serif"
        font-size="22" font-weight="500" letter-spacing="14" fill="#cbd0d8">
    CERTIFICATE OF
  </text>
  <text x="800" y="478" text-anchor="middle"
        font-family="'Cormorant Garamond', 'Georgia', 'Times New Roman', serif"
        font-size="74" font-weight="700" letter-spacing="3"
        fill="url(#amber-soft)">
    Platform Operational Standing
  </text>

  <!-- Decorative divider -->
  <g transform="translate(800, 512)">
    <line x1="-300" y1="0" x2="-30" y2="0" stroke="url(#silver)" stroke-width="1"/>
    <line x1="30" y1="0" x2="300" y2="0" stroke="url(#silver)" stroke-width="1"/>
    <g transform="translate(0, 0)">
      <circle cx="0" cy="0" r="6" fill="none" stroke="url(#amber)" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="2" fill="url(#amber)"/>
      <path d="M -16 0 L -8 0 M 16 0 L 8 0" stroke="url(#amber)" stroke-width="1"/>
    </g>
  </g>

  <!-- ── Body ─────────────────────────────────────────────────────── -->
  <text x="800" y="568" text-anchor="middle"
        font-size="15" letter-spacing="3" font-weight="600" fill="#8a90a0">
    THIS IS TO CERTIFY THAT
  </text>

  <text x="800" y="630" text-anchor="middle"
        font-family="'Cormorant Garamond', 'Georgia', 'Times New Roman', serif"
        font-size="46" font-weight="700" letter-spacing="3" fill="#f0f2f5">
    AlgoSphere Quant
  </text>

  <text x="800" y="668" text-anchor="middle"
        font-size="13" letter-spacing="4" fill="#8a90a0">
    algospherequant.com
  </text>

  <text x="800" y="722" text-anchor="middle"
        font-size="16" font-weight="500" fill="#cbd0d8">
    has demonstrably operationalised the
  </text>
  <text x="800" y="750" text-anchor="middle"
        font-size="18" font-weight="700" letter-spacing="2" fill="#f5b942">
    AI STRATEGY VALIDATION CENTER
  </text>
  <text x="800" y="780" text-anchor="middle"
        font-size="15" font-weight="400" fill="#cbd0d8">
    in full compliance with the AlgoSphere Honesty Contract, satisfying
  </text>
  <text x="800" y="804" text-anchor="middle"
        font-size="15" font-weight="400" fill="#cbd0d8">
    every load-bearing standard listed below.
  </text>

  <!-- ── Standards grid ──────────────────────────────────────────── -->
  <g transform="translate(800, 858)">
    <g font-size="12" font-weight="600" letter-spacing="2" fill="#cbd0d8" text-anchor="middle">
      <!-- Row 1 -->
      <g transform="translate(-465, 0)">
        <circle cx="0" cy="-2" r="3" fill="url(#amber)"/>
        <text x="14" y="2" text-anchor="start">SHADOW EXECUTION ENGINE</text>
      </g>
      <g transform="translate(-155, 0)">
        <circle cx="0" cy="-2" r="3" fill="url(#amber)"/>
        <text x="14" y="2" text-anchor="start">DETERMINISTIC AI COACH</text>
      </g>
      <g transform="translate(155, 0)">
        <circle cx="0" cy="-2" r="3" fill="url(#amber)"/>
        <text x="14" y="2" text-anchor="start">BROKER QUALITY ENGINE</text>
      </g>
      <g transform="translate(465, 0)" text-anchor="end">
        <text x="-14" y="2" text-anchor="end">SAMPLE-GATED PUBLIC SHOWCASE</text>
        <circle cx="0" cy="-2" r="3" fill="url(#amber)"/>
      </g>
      <!-- Row 2 -->
      <g transform="translate(-465, 28)">
        <circle cx="0" cy="-2" r="3" fill="url(#amber)"/>
        <text x="14" y="2" text-anchor="start">STRATEGY STATE MACHINE</text>
      </g>
      <g transform="translate(-155, 28)">
        <circle cx="0" cy="-2" r="3" fill="url(#amber)"/>
        <text x="14" y="2" text-anchor="start">TRADE FORENSICS</text>
      </g>
      <g transform="translate(155, 28)">
        <circle cx="0" cy="-2" r="3" fill="url(#amber)"/>
        <text x="14" y="2" text-anchor="start">15-GATE RISK FIREWALL</text>
      </g>
      <g transform="translate(465, 28)" text-anchor="end">
        <text x="-14" y="2" text-anchor="end">RLS ON ALL PUBLIC TABLES</text>
        <circle cx="0" cy="-2" r="3" fill="url(#amber)"/>
      </g>
    </g>
  </g>

  <!-- ── Lower frame: seal, dates, signatures ────────────────────── -->
  <line x1="240" y1="938" x2="1360" y2="938"
        stroke="url(#silver)" stroke-width="1" opacity="0.5"/>

  <!-- Left: issued date -->
  <g transform="translate(280, 990)">
    <text x="0" y="0" font-size="10" letter-spacing="4" font-weight="700" fill="#8a90a0">ISSUED</text>
    <text x="0" y="28" font-size="20" font-weight="600" fill="#e8eaed">11 JUNE 2026</text>
    <text x="0" y="50" font-size="10" letter-spacing="2" fill="#8a90a0">Reference: AS-CERT-2026-0611-Q4</text>
  </g>

  <!-- Centre: seal -->
  <g transform="translate(800, 998)">
    <!-- Soft glow halo -->
    <circle cx="0" cy="0" r="62" fill="url(#amber)" opacity="0.10" filter="url(#sealGlow)"/>
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="58" fill="none" stroke="url(#amber)" stroke-width="2"/>
    <circle cx="0" cy="0" r="52" fill="none" stroke="url(#amber)" stroke-width="0.8" opacity="0.7"/>
    <!-- Circular text -->
    <defs>
      <path id="sealArcTop" d="M -46 0 A 46 46 0 0 1 46 0"/>
      <path id="sealArcBot" d="M -46 0 A 46 46 0 0 0 46 0"/>
    </defs>
    <text font-size="7" font-weight="700" letter-spacing="3" fill="#f5b942">
      <textPath href="#sealArcTop" startOffset="50%" text-anchor="middle">ALGOSPHERE · VALIDATION CENTER</textPath>
    </text>
    <text font-size="6" font-weight="700" letter-spacing="6" fill="#f5b942" transform="translate(0, -2)">
      <textPath href="#sealArcBot" startOffset="50%" text-anchor="middle">EST · MMXXVI</textPath>
    </text>
    <!-- Inner crest -->
    <g transform="translate(0, -2)">
      <circle cx="0" cy="0" r="22" fill="url(#crestFill)" stroke="url(#amber)" stroke-width="1.2"/>
      <text x="0" y="-2" text-anchor="middle" font-size="14" font-weight="900"
            letter-spacing="2" fill="url(#amber-soft)">AQ</text>
      <text x="0" y="11" text-anchor="middle" font-size="5" font-weight="700"
            letter-spacing="3" fill="#cbd0d8">QUANT</text>
    </g>
  </g>

  <!-- Right: signatures -->
  <g transform="translate(1320, 990)" text-anchor="end">
    <text x="0" y="0" font-size="10" letter-spacing="4" font-weight="700" fill="#8a90a0">AUTHORISED BY</text>
    <text x="0" y="28" font-family="'Cormorant Garamond', 'Georgia', serif"
          font-size="22" font-weight="700" font-style="italic" fill="#e8eaed">
      AlgoSphere Foundation
    </text>
    <text x="0" y="50" font-size="10" letter-spacing="2" fill="#8a90a0">
      Validation Engineering · Internal Standard
    </text>
  </g>

  <!-- Bottom disclosure strip -->
  <text x="800" y="1064" text-anchor="middle"
        font-size="9" letter-spacing="3" fill="#5a606b">
    THIS CERTIFICATION DOCUMENTS INTERNAL PLATFORM-STANDARD COMPLIANCE.  ·  NOT A REGULATORY OR LEGAL CERTIFICATION.  ·  VERIFY AT  algospherequant.com/verify
  </text>
</svg>
